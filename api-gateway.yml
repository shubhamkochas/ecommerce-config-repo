server:
  port: 8282

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:
        - id: auth-service-auth
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
        - id: auth-service-api
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/**
        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/v1/products/**, /api/v1/categories/**, /api/v1/search/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

logging:
  level:
    org.springframework.cloud.gateway: TRACE

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info
